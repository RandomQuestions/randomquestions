<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Questions</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f0ebe3;
      --text: #1a1a1a;
      --hint: rgba(0,0,0,0.25);
      --transition-duration: 0.5s;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      padding: 2rem;
      transition: background-color var(--transition-duration) ease;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    #question {
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: normal;
      line-height: 1.3;
      text-align: center;
      max-width: 800px;
      letter-spacing: -0.01em;
      transition: opacity 0.3s ease;
    }

    #question.fade {
      opacity: 0;
    }

    #hint {
      position: fixed;
      bottom: 2rem;
      font-family: system-ui, sans-serif;
      font-size: 0.75rem;
      color: var(--hint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #back-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--hint);
      font-size: 1.4rem;
      padding: 0.5rem;
      line-height: 1;
      transition: color 0.2s;
      display: none;
    }

    #back-btn:hover {
      color: var(--text);
    }

    #admin-link {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--hint);
      text-decoration: none;
      transition: color 0.2s;
    }

    #admin-link:hover {
      color: var(--text);
    }

    #loading {
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      color: var(--hint);
    }

    @media (prefers-reduced-motion: reduce) {
      body, #question { transition: none; }
    }
  </style>
</head>
<body>

  <button id="back-btn" aria-label="Previous question">←</button>
  <a href="admin.html" id="admin-link">Admin</a>

  <p id="question"><span id="loading">Loading…</span></p>
  <p id="hint">Tap anywhere for a new question</p>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, startAt, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyANdppYvo-__a3Yn1AVTZ_7dt6Om1pIvK4",
      authDomain: "random-questions-c103f.firebaseapp.com",
      projectId: "random-questions-c103f",
      storageBucket: "random-questions-c103f.firebasestorage.app",
      messagingSenderId: "1047016303236",
      appId: "1:1047016303236:web:ba6bde10ceed4bfe0030d1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const COLORS = [
      "#f0ebe3", "#d6e8d0", "#d0dff0", "#f0d6e8",
      "#e8f0d0", "#f0e4d0", "#d0eef0", "#ede8f0"
    ];

    let currentColorIndex = 0;
    let history = [];      // stack of previous question texts
    let currentQuestion = null;
    let isAnimating = false;

    const questionEl = document.getElementById("question");
    const backBtn = document.getElementById("back-btn");

    async function fetchRandomQuestion() {
      const rand = Math.random();
      const q1 = query(
        collection(db, "questions"),
        where("status", "==", "published"),
        orderBy("rand"),
        startAt(rand),
        limit(1)
      );

      let snap = await getDocs(q1);

      // Wrap-around: if no result above rand, start from 0
      if (snap.empty) {
        const q2 = query(
          collection(db, "questions"),
          where("status", "==", "published"),
          orderBy("rand"),
          limit(1)
        );
        snap = await getDocs(q2);
      }

      if (snap.empty) return null;
      return snap.docs[0].data().text;
    }

    function nextColor() {
      currentColorIndex = (currentColorIndex + 1) % COLORS.length;
      document.body.style.backgroundColor = COLORS[currentColorIndex];
    }

    async function showQuestion(text) {
      questionEl.classList.add("fade");
      await new Promise(r => setTimeout(r, 300));
      questionEl.textContent = text;
      nextColor();
      questionEl.classList.remove("fade");
    }

    async function loadNext() {
      if (isAnimating) return;
      isAnimating = true;

      if (currentQuestion) history.push(currentQuestion);
      if (history.length > 1) backBtn.style.display = "block";

      try {
        const text = await fetchRandomQuestion();
        if (text) {
          currentQuestion = text;
          await showQuestion(text);
        } else {
          questionEl.textContent = "No questions yet.";
        }
      } catch (e) {
        console.error(e);
        questionEl.textContent = "Something went wrong. Try again.";
      }

      isAnimating = false;
    }

    function goBack() {
      if (history.length === 0 || isAnimating) return;
      isAnimating = true;

      currentQuestion = history.pop();
      if (history.length === 0) backBtn.style.display = "none";

      questionEl.classList.add("fade");
      setTimeout(() => {
        questionEl.textContent = currentQuestion;
        nextColor();
        questionEl.classList.remove("fade");
        isAnimating = false;
      }, 300);
    }

    // Tap / click anywhere → next question
    document.body.addEventListener("click", (e) => {
      if (e.target === backBtn || backBtn.contains(e.target)) return;
      if (e.target.id === "admin-link") return;
      loadNext();
    });

    // Back button
    backBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      goBack();
    });

    // Swipe support
    let touchStartX = 0;
    document.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener("touchend", e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 60) {
        dx < 0 ? loadNext() : goBack();
      }
    }, { passive: true });

    // Initial load
    loadNext();
  </script>
</body>
</html>
